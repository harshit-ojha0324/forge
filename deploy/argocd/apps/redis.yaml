apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forge-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/harshit-ojha0324/forge
    targetRevision: main
    path: deploy/helm/redis
  destination:
    server: https://kubernetes.default.svc
    namespace: forge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
