# GPU telemetry: NVIDIA's DCGM exporter feeds GPU utilization / memory /
# temperature into Prometheus. Manual sync — only useful while the GPU
# pool is scaled up (stage 4+).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dcgm-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
    chart: dcgm-exporter
    targetRevision: 3.4.2
    helm:
      values: |
        nodeSelector:
          pool: gpu
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        serviceMonitor:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
