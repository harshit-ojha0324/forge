apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-redis
  labels:
    app.kubernetes.io/name: forge-redis
    app.kubernetes.io/part-of: forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.image }}
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forge-redis
  labels:
    app.kubernetes.io/name: forge-redis
    app.kubernetes.io/part-of: forge
spec:
  selector:
    app.kubernetes.io/name: forge-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
