{{- if not .Values.tenantsExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: forge-gateway-tenants
  labels:
    {{- include "forge-gateway.labels" . | nindent 4 }}
stringData:
  tenants.yaml: |
    tenants:
    {{- range .Values.tenants }}
      - name: {{ .name }}
        api_key: {{ .api_key }}
        daily_token_quota: {{ .daily_token_quota }}
    {{- end }}
{{- end }}
