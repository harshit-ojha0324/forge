apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-gateway
  labels:
    {{- include "forge-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "forge-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forge-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # Restart pods when tenant config changes.
        checksum/tenants: {{ .Values.tenants | toYaml | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ . }}
          {{- end }}
          volumeMounts:
            - name: tenants
              mountPath: /etc/forge
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tenants
          secret:
            secretName: {{ .Values.tenantsExistingSecret | default "forge-gateway-tenants" }}
