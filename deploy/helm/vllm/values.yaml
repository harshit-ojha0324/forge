image:
  repository: vllm/vllm-openai
  tag: v0.6.6

# Qwen2.5-3B in fp16 needs ~6GB weights + KV cache — comfortable on a
# 16GB T4. T4 is compute capability 7.5 (no bfloat16), hence dtype=half.
model: Qwen/Qwen2.5-3B-Instruct
servedModelName: qwen2.5-3b-instruct
maxModelLen: 4096
gpuMemoryUtilization: "0.90"
dtype: half

replicas: 1

service:
  port: 8000

# The GPU node pool autoscales 0->1 when this pod is pending: scheduling
# the pod is what summons the node (and its cost).
nodeSelector:
  pool: gpu
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

resources:
  limits:
    nvidia.com/gpu: 1

# Model download happens on every pod start (spot node disks are
# ephemeral). ~2GB for Qwen2.5-3B — a few minutes on first boot.
cacheSizeGi: 30
