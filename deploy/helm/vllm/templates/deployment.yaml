apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: forge
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      # The Service is named "vllm", so Kubernetes injects the legacy
      # service-link var VLLM_PORT=tcp://<ip>:8000 — which vLLM reads as
      # its own config and crashes parsing. Disable the legacy injection.
      enableServiceLinks: false
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - --model={{ .Values.model }}
            - --served-model-name={{ .Values.servedModelName }}
            - --max-model-len={{ .Values.maxModelLen }}
            - --dtype={{ .Values.dtype }}
            - --gpu-memory-utilization={{ .Values.gpuMemoryUtilization }}
            - --port=8000
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_HOME
              value: /models
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          # Model load takes minutes on a fresh spot node; the startup
          # probe holds off liveness until vLLM is actually up.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: {{ .Values.cacheSizeGi }}Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
